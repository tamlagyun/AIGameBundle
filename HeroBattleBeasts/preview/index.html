<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HeroBattleBeasts 预览原型</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #24364f;
        color: #1f2a32;
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      }

      main {
        width: min(1120px, 100vw);
        padding: 16px;
      }

      .frame {
        background: #f7f1d8;
        border: 4px solid #182839;
        box-shadow: 0 18px 0 rgba(0, 0, 0, 0.2);
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 14px;
        font-size: 14px;
        line-height: 1.5;
      }

      h1 {
        margin: 0;
        font-size: 20px;
      }

      .controls {
        text-align: right;
      }

      canvas {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #7fd0ff;
        border-top: 4px solid #182839;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="frame">
        <header>
          <div>
            <h1>HeroBattleBeasts</h1>
            <div>卡通横版跑跳射击预览</div>
          </div>
          <div class="controls">
            A/D 或方向键移动，W/Space 跳跃，J/Z 射击，R 重开
          </div>
        </header>
        <canvas id="gameCanvas" width="960" height="540"></canvas>
      </section>
    </main>
    <script type="module" src="/preview/preview.js"></script>
  </body>
</html>
